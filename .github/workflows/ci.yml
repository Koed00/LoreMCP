name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - run: npm run check:arch

      - run: npx vitest run

      - name: Mutation testing
        run: npm run test:mutation

      - name: Verify package tarball is buildable (does not publish)
        run: npm pack --dry-run
